<!DOCTYPE html>
<html lang="en">
<head>
  <title>Post Internship</title>
  <link rel="stylesheet" href="/css/company-post.css">
</head>

<body>

<div class="container">

  <h1>Post Internship 🚀</h1>

  <form id="jobForm">

    <input type="text" id="title" placeholder="Job Title" required>

    <input type="text" id="company" placeholder="Company Name" required>

    <input type="text" id="duration" placeholder="Duration (e.g. 3 months)" required>

    <input type="text" id="stipend" placeholder="Stipend (e.g. ₹15k/month)" required>

    <textarea id="perks" placeholder="Perks (e.g. Certificate, PPO, Flexible Hours)" required></textarea>

    <textarea id="description" placeholder="Job Description" required></textarea>

    <input type="email" id="contact" placeholder="Contact Email" required>

    <button type="submit">Post Internship 🚀</button>

  </form>

</div>

<script src="/js/company-post.js"></script>

</body>
</html>
